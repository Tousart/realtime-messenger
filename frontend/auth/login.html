<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 40px;
      width: 360px;
    }
    h1 { font-size: 22px; margin-bottom: 28px; }
    label { display: block; font-size: 13px; color: #888; margin-bottom: 6px; }
    input {
      width: 100%;
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 14px;
      padding: 10px 14px;
      margin-bottom: 18px;
      outline: none;
      transition: border-color .15s;
    }
    input:focus { border-color: #555; }
    button {
      width: 100%;
      background: #e0e0e0;
      color: #0f0f0f;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      padding: 11px;
      cursor: pointer;
      transition: background .15s;
    }
    button:hover { background: #c8c8c8; }
    button:disabled { opacity: .5; cursor: default; }
    .error {
      background: #2a1010;
      border: 1px solid #5a2020;
      border-radius: 8px;
      color: #f87171;
      font-size: 13px;
      padding: 10px 14px;
      margin-bottom: 16px;
      display: none;
    }
    .link { margin-top: 18px; font-size: 13px; color: #555; text-align: center; }
    .link a { color: #aaa; text-decoration: none; }
    .link a:hover { color: #e0e0e0; }
  </style>
</head>
<body>
<div class="card">
  <h1>Sign in</h1>
  <div class="error" id="error"></div>
  <form id="form">
    <label>Username</label>
    <input type="text" id="username" placeholder="Enter username" autocomplete="off" />
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter password" />
    <button type="submit" id="btn">Sign in</button>
  </form>
  <div class="link">No account? <a href="/auth/register.html">Register</a></div>
</div>
<script>
  const API = 'http://localhost:8080';

  // If already authed, go to messenger
  if (localStorage.getItem('authed')) {
    window.location.href = '/';
  }

  document.getElementById('form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btn');
    const errEl = document.getElementById('error');
    errEl.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Signing in…';

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    try {
      const res = await fetch(`${API}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user_name: username, password }),
        credentials: 'include',
      });
      const data = await res.json();
      if (!res.ok) {
        throw new Error(data.error || data.message || `Error ${res.status}`);
      }
      localStorage.setItem('authed', '1');
      window.location.href = '/';
    } catch (err) {
      errEl.textContent = err.message;
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Sign in';
    }
  });
</script>
</body>
</html>
