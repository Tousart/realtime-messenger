<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — Messenger</title>
</head>
<body>
    <h2>Регистрация</h2>
    <form id="registerForm">
        <input type="text" id="username" placeholder="Имя пользователя" required><br><br>
        <input type="password" id="password" placeholder="Пароль" required><br><br>
        <button type="submit">Зарегистрироваться</button>
    </form>
    <p>Уже есть аккаунт? <a href="/login">Войти</a></p>

    <script>
        const BACKEND_URL = 'http://localhost:8080';

        document.getElementById('registerForm').onsubmit = async (e) => {
            e.preventDefault();
            const res = await fetch(BACKEND_URL + '/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({
                    user_name: document.getElementById('username').value,
                    password: document.getElementById('password').value
                })
            });
            if (res.ok) {
                window.location.href = '/';
            } else {
                alert('Ошибка регистрации: ' + res.statusText);
            }
        };
    </script>
</body>
</html>
