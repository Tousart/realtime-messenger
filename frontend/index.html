<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messenger</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 260px;
      min-width: 260px;
      background: #141414;
      border-right: 1px solid #222;
      display: flex;
      flex-direction: column;
    }
    .sidebar-header {
      padding: 18px 16px 14px;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .sidebar-header .username {
      font-size: 14px;
      font-weight: 600;
      color: #e0e0e0;
    }
    .sidebar-header .user-id {
      font-size: 11px;
      color: #555;
      margin-top: 2px;
    }
    .logout-btn {
      background: none;
      border: 1px solid #333;
      border-radius: 6px;
      color: #777;
      font-size: 11px;
      padding: 4px 8px;
      cursor: pointer;
    }
    .logout-btn:hover { color: #e0e0e0; border-color: #555; }

    .chats-label {
      padding: 14px 16px 8px;
      font-size: 11px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    .chats-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 8px;
    }
    .chat-item {
      padding: 10px 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      color: #aaa;
      transition: background .1s, color .1s;
    }
    .chat-item:hover { background: #1e1e1e; color: #e0e0e0; }
    .chat-item.active { background: #222; color: #e0e0e0; }
    .chat-item .chat-id { font-size: 11px; color: #444; margin-top: 2px; }

    .create-btn {
      margin: 12px;
      background: #1e1e1e;
      border: 1px solid #2e2e2e;
      border-radius: 8px;
      color: #aaa;
      font-size: 13px;
      padding: 9px;
      cursor: pointer;
      transition: background .1s, color .1s;
    }
    .create-btn:hover { background: #252525; color: #e0e0e0; }

    /* ── Main area ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .chat-header {
      padding: 16px 20px;
      border-bottom: 1px solid #222;
      font-size: 15px;
      font-weight: 600;
      min-height: 57px;
      color: #888;
    }
    .chat-header.active { color: #e0e0e0; }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .msg {
      max-width: 65%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.45;
      word-break: break-word;
    }
    .msg.mine {
      align-self: flex-end;
      background: #2a2a2a;
      color: #e0e0e0;
    }
    .msg.other {
      align-self: flex-start;
      background: #1e1e1e;
      color: #ccc;
    }
    .msg .meta {
      font-size: 11px;
      color: #555;
      margin-top: 4px;
    }

    .placeholder {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
      font-size: 14px;
    }

    .input-area {
      padding: 14px 20px;
      border-top: 1px solid #222;
      display: flex;
      gap: 10px;
    }
    .input-area textarea {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      color: #e0e0e0;
      font-size: 14px;
      padding: 10px 14px;
      outline: none;
      resize: none;
      height: 42px;
      max-height: 120px;
      font-family: inherit;
      line-height: 1.4;
      transition: border-color .15s;
    }
    .input-area textarea:focus { border-color: #444; }
    .input-area textarea:disabled { opacity: .4; cursor: default; }
    .send-btn {
      background: #e0e0e0;
      color: #0f0f0f;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      padding: 0 18px;
      cursor: pointer;
      white-space: nowrap;
      transition: background .15s;
    }
    .send-btn:hover { background: #c8c8c8; }
    .send-btn:disabled { opacity: .4; cursor: default; }

    /* ── Modal ── */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.6);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 28px;
      width: 380px;
    }
    .modal h2 { font-size: 16px; margin-bottom: 20px; }
    .modal label { display: block; font-size: 12px; color: #666; margin-bottom: 6px; }
    .modal input {
      width: 100%;
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 14px;
      padding: 9px 12px;
      margin-bottom: 14px;
      outline: none;
    }
    .modal input:focus { border-color: #555; }
    .modal-hint { font-size: 12px; color: #555; margin-bottom: 14px; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
    .modal-actions button {
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      padding: 8px 18px;
      cursor: pointer;
      border: none;
    }
    .btn-cancel { background: #222; color: #888; }
    .btn-cancel:hover { background: #2a2a2a; color: #e0e0e0; }
    .btn-confirm { background: #e0e0e0; color: #0f0f0f; }
    .btn-confirm:hover { background: #c8c8c8; }
    .modal .error {
      background: #2a1010;
      border: 1px solid #5a2020;
      border-radius: 6px;
      color: #f87171;
      font-size: 12px;
      padding: 8px 12px;
      margin-bottom: 12px;
      display: none;
    }

    /* scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }
  </style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <div class="sidebar-header">
    <div>
      <div class="username" id="username">—</div>
      <div class="user-id" id="user-id"></div>
    </div>
    <button class="logout-btn" id="logout-btn">Logout</button>
  </div>
  <div class="chats-label">Chats</div>
  <div class="chats-list" id="chats-list"></div>
  <button class="create-btn" id="create-btn">+ New chat</button>
</div>

<!-- Main -->
<div class="main">
  <div class="chat-header" id="chat-header">Select a chat</div>
  <div class="messages" id="messages">
    <div class="placeholder" id="placeholder">No chat selected</div>
  </div>
  <div class="input-area">
    <textarea id="msg-input" placeholder="Type a message… (Enter to send)" disabled></textarea>
    <button class="send-btn" id="send-btn" disabled>Send</button>
  </div>
</div>

<!-- Create chat modal -->
<div class="modal-backdrop" id="modal">
  <div class="modal">
    <h2>New chat</h2>
    <div class="error" id="modal-error"></div>
    <label>Chat name</label>
    <input type="text" id="modal-name" placeholder="e.g. Team chat" autocomplete="off" />
    <label>Participant IDs</label>
    <input type="text" id="modal-participants" placeholder="e.g. 2, 3, 5" autocomplete="off" />
    <div class="modal-hint">Enter user IDs separated by commas. You are added automatically.</div>
    <div class="modal-actions">
      <button class="btn-cancel" id="modal-cancel">Cancel</button>
      <button class="btn-confirm" id="modal-confirm">Create</button>
    </div>
  </div>
</div>

<script>
  const API = 'http://localhost:8080';
  const WS_URL = 'ws://localhost:8080/messenger';

  // ── Auth guard ──
  // HttpOnly cookie is invisible to JS, use localStorage flag set on login
  if (!localStorage.getItem('authed')) {
    window.location.href = '/auth/login.html';
  }

  // ── State ──
  let ws = null;
  let me = null;          // { user_id, user_name }
  let activeChatId = null;
  const chatMessages = {}; // chatId → [{sender_id, text, created_at, mine}]

  // ── DOM refs ──
  const usernameEl   = document.getElementById('username');
  const userIdEl     = document.getElementById('user-id');
  const chatsListEl  = document.getElementById('chats-list');
  const chatHeaderEl = document.getElementById('chat-header');
  const messagesEl   = document.getElementById('messages');
  const placeholderEl= document.getElementById('placeholder');
  const msgInput     = document.getElementById('msg-input');
  const sendBtn      = document.getElementById('send-btn');

  // ── WebSocket ──
  function connect() {
    ws = new WebSocket(WS_URL);

    ws.onopen = () => console.log('[ws] connected');

    ws.onmessage = (ev) => {
      let data;
      try { data = JSON.parse(ev.data); } catch (e) { console.error('[ws] parse error:', e); return; }

      console.log('[ws] received:', data);

      // Initial payload sent right after connection — has no type field
      if (data.type === undefined) {
        me = { user_id: data.user_id, user_name: data.user_name };
        usernameEl.textContent = me.user_name;
        userIdEl.textContent   = `ID: ${me.user_id}`;
        renderChats(data.chats || []);
        return;
      }

      switch (data.type) {
        case 'error':
          console.warn('[ws] error:', data.status, data.error);
          if (data.status === 401) { localStorage.removeItem('authed'); window.location.href = '/auth/login.html'; }
          break;

        case 'ok':
          // join ack — no action needed
          break;

        case 'message.new': {
          const { sender_id, chat_id, text, created_at } = data.payload;
          pushMessage(chat_id, { sender_id, text, created_at, mine: String(sender_id) === String(me?.user_id) });
          break;
        }

        case 'message.created':
          // server ack that message was saved — rendered via message.new broadcast
          break;

        case 'chat.created':
          addChat({ chat_id: data.payload.chat_id, chat_name: data.payload.chat_name });
          break;

        default:
          console.warn('[ws] unknown event type:', data.type, data);
      }
    };

    ws.onclose = (ev) => {
      console.log('[ws] closed', ev.code);
      // 1008 = Policy Violation (auth failure from server)
      if (ev.code === 1008 || ev.code === 4001) {
        localStorage.removeItem('authed');
        window.location.href = '/auth/login.html';
        return;
      }
      setTimeout(connect, 2000);
    };

    ws.onerror = (err) => console.error('[ws] error', err);
  }

  function send(method, payload) {
    console.log('[ws] send:', method, payload, '| readyState:', ws?.readyState);
    if (!ws || ws.readyState !== WebSocket.OPEN) {
      console.warn('[ws] send: WebSocket not open (state=' + ws?.readyState + '), dropping:', method);
      return;
    }
    ws.send(JSON.stringify({ method, payload }));
  }

  // ── Chats ──
  function renderChats(chats) {
    chatsListEl.innerHTML = '';
    chats.forEach(c => addChat(c));
  }

  function addChat(chat) {
    // avoid duplicates
    if (document.querySelector(`[data-chat-id="${chat.chat_id}"]`)) return;
    if (!chatMessages[chat.chat_id]) chatMessages[chat.chat_id] = [];

    const el = document.createElement('div');
    el.className = 'chat-item';
    el.dataset.chatId = chat.chat_id;
    el.innerHTML = `<div>${escHtml(chat.chat_name)}</div><div class="chat-id">#${chat.chat_id}</div>`;
    el.addEventListener('click', () => joinChat(chat.chat_id, chat.chat_name));
    chatsListEl.appendChild(el);
  }

  function joinChat(chatId, chatName) {
    if (activeChatId === chatId) return;
    activeChatId = chatId;

    document.querySelectorAll('.chat-item').forEach(el => {
      el.classList.toggle('active', el.dataset.chatId == chatId);
    });

    chatHeaderEl.textContent = chatName;
    chatHeaderEl.classList.add('active');
    msgInput.disabled = false;
    sendBtn.disabled = false;
    msgInput.focus();

    send('join', { chat_id: chatId });
    renderMessages(chatId);
  }

  // ── Messages ──
  function pushMessage(chatId, msg) {
    if (!chatMessages[chatId]) chatMessages[chatId] = [];
    chatMessages[chatId].push(msg);
    if (chatId === activeChatId) renderMessages(chatId);
  }

  function renderMessages(chatId) {
    const msgs = chatMessages[chatId] || [];
    placeholderEl.style.display = msgs.length ? 'none' : 'flex';
    messagesEl.querySelectorAll('.msg').forEach(el => el.remove());

    msgs.forEach(m => {
      const el = document.createElement('div');
      el.className = `msg ${m.mine ? 'mine' : 'other'}`;
      const time = m.created_at ? new Date(m.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '';
      el.innerHTML = `<div>${escHtml(m.text)}</div><div class="meta">${m.mine ? 'You' : `User ${m.sender_id}`}${time ? ' · ' + time : ''}</div>`;
      messagesEl.appendChild(el);
    });

    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  // ── Send message ──
  function sendMessage() {
    const text = msgInput.value.trim();
    if (!text || !activeChatId) return;
    send('send', { chat_id: activeChatId, text, sender_id: me?.user_id });
    msgInput.value = '';
    msgInput.style.height = '42px';
  }

  sendBtn.addEventListener('click', sendMessage);
  msgInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  msgInput.addEventListener('input', () => {
    msgInput.style.height = '42px';
    msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
  });

  // ── Create chat modal ──
  const modalEl     = document.getElementById('modal');
  const modalError  = document.getElementById('modal-error');
  const modalName   = document.getElementById('modal-name');
  const modalParts  = document.getElementById('modal-participants');

  document.getElementById('create-btn').addEventListener('click', () => {
    console.log('[create-btn] clicked | me:', me, '| ws.readyState:', ws?.readyState);
    modalError.style.display = 'none';
    modalName.value = '';
    modalParts.value = '';
    modalEl.classList.add('open');
    modalName.focus();
  });
  document.getElementById('modal-cancel').addEventListener('click', () => modalEl.classList.remove('open'));
  modalEl.addEventListener('click', (e) => { if (e.target === modalEl) modalEl.classList.remove('open'); });

  document.getElementById('modal-confirm').addEventListener('click', () => {
    console.log('[modal-confirm] clicked | me:', me, '| ws.readyState:', ws?.readyState);
    modalError.style.display = 'none';
    const name = modalName.value.trim();
    if (!name) { showModalError('Chat name is required'); return; }

    if (!me) { showModalError('Not connected yet, please wait'); return; }
    if (!ws || ws.readyState !== WebSocket.OPEN) { showModalError('WebSocket not connected'); return; }

    const rawIds = modalParts.value.split(',').map(s => s.trim()).filter(Boolean);
    const participantIds = rawIds.filter(s => !isNaN(s) && Number(s) > 0);

    const allIds = [...new Set([String(me.user_id), ...participantIds.map(String)])];
    const participants = allIds.map(id => ({ participant_id: id, participant_name: null, role: null }));

    const payload = { chat_name: name, creator_id: me.user_id, chat_participants: participants };
    console.log('[modal-confirm] sending create:', payload);
    send('create', payload);
    modalEl.classList.remove('open');
  });

  function showModalError(msg) {
    modalError.textContent = msg;
    modalError.style.display = 'block';
  }

  // ── Logout ──
  document.getElementById('logout-btn').addEventListener('click', () => {
    // Cookie is HttpOnly — can't clear it via JS; clearing localStorage flag is enough for auth guard.
    // The session will expire server-side (6h TTL in Redis).
    localStorage.removeItem('authed');
    if (ws) ws.close();
    window.location.href = '/auth/login.html';
  });

  // ── Utils ──
  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ── Start ──
  connect();
</script>
</body>
</html>
